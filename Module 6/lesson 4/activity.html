<!DOCTYPE html>
<html>
    <head></head>
    <body>
        <div id="MyClockDisplay" onloaad="showTime()"></div>

        <script>
            function showTime() {
                var data = new Date();
                var h = data.getHours();//0-23
                var m = data.getMinutes();//0-59
                var s = data.getSeconds();//0-59
                var session = "AM"
                if (h > 12) {
                    h = h - 12;
                    session = "PM";
                }
                  h = (h < 10) ? "0" + h : h;
                  m = (m < 10) ? "0" + m : m;
                  s = (s < 10) ? "0" + s : s; 
                  
                  var time = h + ":" + m + ":"+ s + " "+ session;
                  document.getElementById("MyClockDisplay").innerText = time;setTimeout(showTime,1000)
             }
             showTime()
        </script>
    </body>
</html>
