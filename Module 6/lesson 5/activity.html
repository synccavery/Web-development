<!DOCTYPE html>
<html>
    <head></head>
    <body>
        <div>
            <h1>Stopwatch</h1>
            <p><span id="seconds">00</span>:<span id="milliseconds">00</span></p>
            <button id="button-start">Start</button>
            <button id="button-stop">Stop</button>
            <button id="button-reset">Reset</button>
        </div>

        <script>
            var seconds = 0;
            var milliseconds = 0;
            var appendMilliseconds;
            var appendSeconds
            var buttonStart;
            var buttonStop;
            var buttonReset;
            var Interval;

            window.onload = function() {
                appendMilliseconds = document.getElementById("milliseconds");
                appendSeconds = document.getElementById("seconds");
                buttonStart = document.getElementById("button-start");
                buttonStop = document.getElementById("button-stop");
                buttonReset = document.getElementById("button-reset");

                buttonStart.onclick = function () {
                    clearInterval(Interval);
                    Interval = setInterval(startTimer, 10);
                }
                buttonStop.onclick = function () {
                    clearInterval(Interval);
                }
                buttonReset.onclick = function () {
                    clearInterval(Interval);
                    milliseconds = 0;
                    seconds = 0;
                    appendMilliseconds.innerHTML = "00"
                    appendSeconds.innerHTML = "00";
                }
            }

            function startTimer() {
                milliseconds++;
                if (milliseconds <= 9) {
                    appendMilliseconds.innerHTML = "0" + milliseconds;
                }
                if (milliseconds > 9) {
                    appendMilliseconds.innerHTML = milliseconds;
                }
                if (milliseconds > 99) {
                    seconds++;
                    appendSeconds.innerHTML = (seconds < 10 ? "0" : "") + seconds;
                    milliseconds = 0;
                    appendMilliseconds.innerHTML = "00"
                }
            }
        </script>
    </body>
</html>
