<!DOCTYPE html>
<html>

<head>
    <title>Navbar</title>
    <style>
        body{
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
        }
        .topnav{
            overflow: hidden;
            background-color: burlywood;
        }
        .topnav a {
            float: left;
            color: beige;
            text-align: center;
            padding: 14px 16px;
            text-decoration: none;
            font-size: 15px;
        }
        .topnav a:hover {
            background-color: rgb(247, 243, 243);
            color:chocolate
        }
        .topnav a.active {
            background-color:rgb(219, 166, 148);
        }
    </style>
</head>
<body>
    <div class="topnav">
        <a class="active" href="#home">Home</a>
        <a href="a">About Us</a>
        <a href="a">Gallery</a>
        <a href="a">Contact Us</a>
    </div>
</body>
</html>
